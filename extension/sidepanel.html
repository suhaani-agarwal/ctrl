<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Agent</h1>
      <button id="settings-toggle" title="Settings">⚙️</button>
    </header>

    <div id="settings-panel" class="hidden">
      <label for="api-key">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="Paste your API key...">
      <p class="hint">Stored locally. Get yours at aistudio.google.com</p>
    </div>

    <main id="transcript"></main>

    <div class="controls">
      <div id="status-bar">
        <span id="status-text">Initializing...</span>
        <div id="screenshot-indicator" title="Capturing screen"></div>
      </div>
      <button id="mic-btn" title="Hold to talk">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
