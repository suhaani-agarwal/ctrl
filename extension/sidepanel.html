<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ctrl</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div id="panel">
      <!-- Header -->
      <header>
        <span class="agent-name">ctrl</span>
        <span id="status-badge" class="badge idle">Idle</span>
        <button
          id="abort-btn"
          class="abort-btn hidden"
          title="Abort current task"
        >
          &#9632; Stop
        </button>
      </header>

      <!-- Task card (shown when task is running) -->
      <div id="task-card" class="hidden">
        <div id="task-text"></div>
        <div id="task-meta">
          <span id="skill-badge" class="skill-tag hidden"></span>
          <span id="step-counter" class="step-tag hidden"></span>
        </div>
        <div id="tab-badges"></div>
      </div>

      <!-- Voice transcript (conversation bubbles) -->
      <div id="transcript"></div>

      <!-- Field question panel (shown when agent needs user input) -->
      <div id="field-question-panel" class="hidden">
        <div id="field-question-text"></div>
        <div id="field-input-row">
          <input
            type="text"
            id="field-answer-input"
            placeholder="Type your answer..."
          />
          <button id="field-answer-send">Send</button>
        </div>
        <div id="field-input-hint">Press Enter or click Send</div>
      </div>

      <!-- Live action log -->
      <div id="action-log-wrap">
        <div id="action-log-header">Action Log</div>
        <div id="action-log"></div>
      </div>

      <!-- Footer controls -->
      <footer>
        <button id="record-btn" class="icon-btn" title="Record workflow">
          &#9210;
        </button>
        <button
          id="mic-btn"
          class="mic-btn mic-off"
          title="Click to start/stop listening"
        >
          <svg
            viewBox="0 0 24 24"
            width="26"
            height="26"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
          &#9881;
        </button>
      </footer>

      <!-- Recording banner -->
      <div id="recording-banner" class="hidden">
        <span class="rec-dot"></span> Recording workflow&hellip; say &ldquo;stop
        recording&rdquo; to save.
      </div>

      <!-- Settings drawer -->
      <div id="settings-drawer" class="hidden">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button id="settings-close-btn" title="Back">&#8592; Back</button>
        </div>
        <div class="settings-section">
          <label>Gemini API Key</label>
          <input
            type="password"
            id="gemini-key"
            placeholder="Paste Gemini key..."
          />
          <span class="hint">Get yours at aistudio.google.com</span>
        </div>
        <div class="settings-section">
          <label>Groq API Key</label>
          <input
            type="password"
            id="groq-key"
            placeholder="Paste Groq key..."
          />
          <span class="hint">Get yours at console.groq.com</span>
        </div>
        <div class="settings-section">
          <label>OpenRouter API Key</label>
          <input
            type="password"
            id="openrouter-key"
            placeholder="Paste OpenRouter key..."
          />
          <span class="hint"
            >Get yours at openrouter.ai/keys (free tier works)</span
          >
        </div>
        <div class="settings-section">
          <label>Permission Mode</label>
          <select id="permission-mode">
            <option value="ask">Ask Always</option>
            <option value="domain">Ask Per Domain</option>
            <option value="silent">Silent</option>
          </select>
        </div>
        <div class="settings-section">
          <label>Installed Skills</label>
          <div id="skills-list"></div>
          <div class="skill-install-row">
            <input
              type="text"
              id="skill-url"
              placeholder="GitHub raw URL to install skill..."
            />
            <button id="install-skill-btn">Install</button>
          </div>
          <span id="install-status" class="hint"></span>
        </div>
        <div class="settings-section">
          <label>Saved Workflows</label>
          <div id="workflows-list"></div>
        </div>
        <div class="settings-section">
          <label>Profile Memory</label>
          <div id="profile-list"></div>
          <span id="profile-empty-hint" class="hint"
            >No profile data saved yet.</span
          >
        </div>
      </div>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
